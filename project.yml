name: 7ZIP4MAC
options:
  bundleIdPrefix: com.jensyleo
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  minimumXcodeGenVersion: "2.40.0"

packages:
  SevenZipKit:
    path: SevenZipKit

targets:
  SevenZip4Mac:
    type: application
    platform: macOS
    sources:
      - path: App/Sources
      - path: App/Resources/Assets.xcassets
      # AppleScript dictionary, referenced by OSAScriptingDefinition in Info.plist.
      - path: App/Resources/7ZIP4MAC.sdef
      # One .icns per archive/disk-image format, referenced by
      # CFBundleTypeIconFile / UTTypeIconFile in Info.plist.
      - path: App/Resources/FileTypeIcons
      # Folder reference: the official 7zz engine is copied verbatim into
      # Contents/Resources/Engine/, preserving the executable bit.
      - path: App/Resources/Engine
        type: folder
    dependencies:
      - package: SevenZipKit
        product: SevenZipKit
    scheme:
      buildImplicitDependencies: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jensyleo.sevenzip4mac
        PRODUCT_NAME: 7ZIP4MAC
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        # Intel-only build: this fork exists specifically for x86_64 Macs, so
        # the arm64 slice is dropped rather than shipping a universal binary.
        ARCHS: x86_64
        VALID_ARCHS: x86_64
        ONLY_ACTIVE_ARCH: NO
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Non-sandboxed: the app spawns the bundled 7zz engine and must
        # read/write arbitrary user-chosen archives. Distributed outside the
        # Mac App Store; sandbox to be revisited in a later phase.
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
